<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600;700&display=swap" rel="stylesheet">
  <title>Pluck</title>
  <style>
    /* ── Theme variables ───────────────────────────────────────────────── */
    :root, [data-theme="dark"] {
      --bg:           #1E27AE;
      --bg2:          rgba(255, 255, 255, 0.06);
      --bg3:          rgba(255, 255, 255, 0.10);
      --border:       rgba(255, 255, 255, 0.12);
      --border2:      rgba(255, 255, 255, 0.20);
      --text:         #f0f0f0;
      --text2:        #b0b0c0;
      --text3:        rgba(255, 255, 255, 0.40);
      --text4:        rgba(255, 255, 255, 0.20);
      --brand:        #1E27AE;
      --accent:       #D4A830;
      --accent-hover: #B89020;
      --btn-primary-bg:  #D4A830;
      --btn-primary-txt: #0f0f14;
      --btn-scan-bg:     transparent;
      --btn-scan-txt:    rgba(255, 255, 255, 0.40);
      --btn-scan-border: rgba(255, 255, 255, 0.12);
      --btn-scan-hover:  rgba(255, 255, 255, 0.10);
      --btn-scan-hover-txt: #b0b0c0;
      --tag-flight-bg:  #0e1530; --tag-flight-txt: #5a8af7;
      --tag-hotel-bg:   #0d1f17; --tag-hotel-txt:  #3ecf8e;
      --tag-charter-bg: #1a1040; --tag-charter-txt: #b794f4;
      --card-bg:        rgba(255, 255, 255, 0.06);
      --card-border:    rgba(255, 255, 255, 0.12);
      --err-bg: #1f0e12; --err-border: #5a2030; --err-txt: #f87171;
      --warn-bg: #1e1800; --warn-border: #564200; --warn-txt: #D4A830;
      --info-bg: #0e1228; --info-border: #1e2a5a; --info-txt: #5a8af7;
      --hint-txt: rgba(255, 255, 255, 0.20);
      --footer-txt: rgba(255, 255, 255, 0.20);
      --header-border: rgba(255, 255, 255, 0.12);
      --divider: rgba(255, 255, 255, 0.08);
      --type-dinner-bg: #2a1a00; --type-dinner-txt: #D4A830;
      --type-meeting-bg: #0e1530; --type-meeting-txt: #5a8af7;
      --type-appt-bg: #1a1040; --type-appt-txt: #a07cf0;
      --type-event-bg: #1a0018; --type-event-txt: #e060d0;
      --type-other-bg: #22222e; --type-other-txt: #6a6a80;
      --type-party-bg: #1a0018; --type-party-txt: #e060d0;
      --type-pickup-bg: #261400; --type-pickup-txt: #f09040;
      --type-grooming-bg: #081a1a; --type-grooming-txt: #40c8b0;
      --type-styling-bg: #1a0a14; --type-styling-txt: #f07090;
      --type-perform-bg: #14103a; --type-perform-txt: #8888f0;
      --type-photo-bg: #0a1820; --type-photo-txt: #40b8e8;
      --type-interview-bg: #181a08; --type-interview-txt: #a8c840;
      --add-cal-bg: #D4A830; --add-cal-txt: #0f0f14;
    }

    [data-theme="light"] {
      --bg:           #deeeff;
      --bg2:          #cce0f5;
      --bg3:          #bdd4ec;
      --border:       #a8c4de;
      --border2:      #90afc8;
      --text:         #0d1f30;
      --text2:        #234;
      --text3:        #4a6a88;
      --text4:        #7a9ab8;
      --btn-primary-bg:  #1a5fa8;
      --btn-primary-txt: #fff;
      --btn-scan-bg:     transparent;
      --btn-scan-txt:    #3a6a98;
      --btn-scan-border: #a8c4de;
      --btn-scan-hover:  #cce0f5;
      --btn-scan-hover-txt: #1a5fa8;
      --tag-flight-bg:  #c8dff5; --tag-flight-txt: #1a5fa8;
      --tag-hotel-bg:   #c2f0e0; --tag-hotel-txt:  #0d6644;
      --tag-charter-bg: #ede8ff; --tag-charter-txt: #5a2ea8;
      --card-bg:        #eef6ff;
      --card-border:    #b8d4ee;
      --err-bg: #fdecea; --err-border: #f5b8b8; --err-txt: #c0392b;
      --warn-bg: #fff8e1; --warn-border: #ffd54f; --warn-txt: #7a5900;
      --info-bg: #e8f4fd; --info-border: #a8d4f0; --info-txt: #1a5fa8;
      --hint-txt: #90afc8;
      --footer-txt: #90afc8;
      --header-border: #b8d4ee;
      --divider: #b8d4ee;
      --type-dinner-bg: #fff0d0; --type-dinner-txt: #8a4e00;
      --type-meeting-bg: #daeeff; --type-meeting-txt: #1a5fa8;
      --type-appt-bg: #ede8ff; --type-appt-txt: #5a2ea8;
      --type-event-bg: #fce8ff; --type-event-txt: #8a0aa0;
      --type-other-bg: #e8eef4; --type-other-txt: #4a6a88;
      --add-cal-bg: #1a5fa8; --add-cal-txt: #fff;
    }

    /* ── Reset & base ──────────────────────────────────────────────────── */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 440px; min-height: 200px;
      font-family: 'Poppins', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px; color: var(--text); background: var(--bg); padding: 20px;
      transition: background 0.2s, color 0.2s;
    }

    /* ── Header ────────────────────────────────────────────────────────── */
    .header { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; padding-bottom: 14px; border-bottom: 1px solid var(--header-border); }
    .header-icon { width: 32px; height: 32px; background: var(--btn-primary-bg); border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .header-icon svg { stroke: var(--btn-primary-txt); }
    .header-title { font-size: 15px; font-weight: 600; color: var(--text); }
    .header-sub { font-size: 11px; color: var(--text3); margin-top: 1px; }

    /* ── API row ───────────────────────────────────────────────────────── */
    .api-row { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; }
    .api-row input { flex: 1; padding: 7px 10px; border: 1px solid var(--border); border-radius: 7px; font-size: 12px; font-family: monospace; color: var(--text); background: var(--bg2); outline: none; }
    .api-row input:focus { border-color: var(--border2); }
    .api-save-btn { padding: 7px 12px; font-size: 12px; font-weight: 500; border: 1px solid var(--border); border-radius: 7px; background: var(--bg2); cursor: pointer; color: var(--text); }
    .api-save-btn:hover { background: var(--bg3); }

    /* ── URL row ───────────────────────────────────────────────────────── */
    .url-row { display: flex; gap: 6px; margin-bottom: 10px; }
    .url-row input { flex: 1; padding: 7px 10px; border: 1px solid var(--border); border-radius: 7px; font-size: 12px; color: var(--text); background: var(--bg2); outline: none; }
    .url-row input::placeholder { color: var(--text4); }
    .url-row input:focus { border-color: var(--border2); }
    .url-btn { padding: 7px 12px; font-size: 12px; font-weight: 500; border: 1px solid var(--border); border-radius: 7px; background: var(--bg2); cursor: pointer; color: var(--text2); }
    .url-btn:hover { background: var(--bg3); }

    /* ── Divider ───────────────────────────────────────────────────────── */
    .or-divider { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
    .or-divider::before, .or-divider::after { content: ''; flex: 1; height: 1px; background: var(--divider); }
    .or-divider span { font-size: 11px; color: var(--text4); }

    /* ── Drop zone ─────────────────────────────────────────────────────── */
    .drop-zone { border: 1.5px dashed var(--border); border-radius: 10px; padding: 22px 16px; text-align: center; transition: background 0.15s, border-color 0.15s; cursor: pointer; }
    .drop-zone.drag-over { background: var(--bg3); border-color: #5aabf7; }
    .drop-zone.has-files { border-color: #3ecf8e; border-style: solid; }
    .drop-zone.paste-flash { border-color: #5aabf7; border-style: solid; animation: pulse 0.4s ease-out; }
    @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(90,171,247,0.35); } 100% { box-shadow: 0 0 0 8px rgba(90,171,247,0); } }
    .upload-icon { margin-bottom: 8px; color: var(--text4); transition: color 0.15s; }
    .drop-zone.has-files .upload-icon { color: #3ecf8e; }
    .upload-label { font-size: 13px; color: var(--text3); }
    .upload-sublabel { font-size: 11px; color: var(--text4); margin-top: 5px; }
    #file-input { display: none; }
    .browse-btn { display: inline-block; margin-top: 12px; padding: 6px 16px; font-size: 12px; font-weight: 500; color: var(--text2); background: var(--bg2); border: 1px solid var(--border); border-radius: 6px; cursor: pointer; }
    .browse-btn:hover { background: var(--bg3); }

    /* ── File list ─────────────────────────────────────────────────────── */
    .file-list { margin-top: 8px; display: flex; flex-direction: column; gap: 4px; }
    .file-item { display: flex; align-items: center; gap: 6px; background: var(--bg2); border: 1px solid var(--border); border-radius: 6px; padding: 5px 8px; }
    .file-item-name { flex: 1; font-size: 11px; color: var(--text2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .file-item img { max-height: 40px; max-width: 60px; border-radius: 4px; object-fit: cover; flex-shrink: 0; }
    .file-remove { background: none; border: none; color: var(--text4); cursor: pointer; font-size: 11px; padding: 0 2px; flex-shrink: 0; }
    .file-remove:hover { color: #f87171; }

    /* ── Buttons ───────────────────────────────────────────────────────── */
    .btn-primary { width: 100%; padding: 11px; font-size: 14px; font-weight: 600; background: var(--btn-primary-bg); color: var(--btn-primary-txt); border: none; border-radius: 8px; cursor: pointer; transition: opacity 0.15s; margin-top: 10px; }
    .btn-primary:hover { opacity: 0.88; }
    .btn-primary:disabled { opacity: 0.25; cursor: not-allowed; }

    .btn-scan { width: 100%; padding: 10px; font-size: 13px; font-weight: 500; background: var(--btn-scan-bg); color: var(--btn-scan-txt); border: 1px solid var(--btn-scan-border); border-radius: 8px; cursor: pointer; transition: background 0.15s, color 0.15s, border-color 0.15s; margin-top: 8px; display: flex; align-items: center; justify-content: center; gap: 7px; }
    .btn-scan:hover { background: var(--btn-scan-hover); color: var(--btn-scan-hover-txt); border-color: var(--border2); }
    .btn-scan:disabled { opacity: 0.3; cursor: not-allowed; }
    .scan-hint { font-size: 11px; color: var(--hint-txt); text-align: center; margin-top: 5px; }

    /* ── Status ────────────────────────────────────────────────────────── */
    #status { font-size: 12px; color: var(--text3); margin-top: 10px; min-height: 18px; display: flex; align-items: center; gap: 6px; }
    .spinner { width: 12px; height: 12px; border: 2px solid var(--border); border-top-color: var(--text3); border-radius: 50%; animation: spin 0.7s linear infinite; flex-shrink: 0; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Message boxes ─────────────────────────────────────────────────── */
    .error-box { background: var(--err-bg); border: 1px solid var(--err-border); border-radius: 8px; padding: 10px 12px; font-size: 12px; color: var(--err-txt); margin-top: 10px; line-height: 1.6; }
    .warn-box  { background: var(--warn-bg); border: 1px solid var(--warn-border); border-radius: 8px; padding: 10px 12px; font-size: 12px; color: var(--warn-txt); margin-top: 10px; line-height: 1.7; }
    .warn-box strong  { font-weight: 600; display: block; margin-bottom: 3px; }
    .info-box  { background: var(--info-bg); border: 1px solid var(--info-border); border-radius: 8px; padding: 10px 12px; font-size: 12px; color: var(--info-txt); margin-top: 10px; line-height: 1.7; }
    .info-box strong  { font-weight: 600; display: block; margin-bottom: 3px; }

    /* ── Results label ─────────────────────────────────────────────────── */
    .results-label { font-size: 10px; font-weight: 600; letter-spacing: 0.07em; text-transform: uppercase; color: var(--text3); margin: 14px 0 8px; }

    /* ── Travel event cards ────────────────────────────────────────────── */
    .event-card { border: 1px solid var(--card-border); border-radius: 10px; padding: 12px 14px; margin-bottom: 8px; background: var(--card-bg); }
    .event-top { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .event-icon { color: var(--text3); display: flex; align-items: center; flex-shrink: 0; }
    .event-title { font-weight: 600; font-size: 13px; flex: 1; line-height: 1.3; color: var(--text); }
    .tag { font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 5px; flex-shrink: 0; }
    .tag-flight   { background: var(--tag-flight-bg);   color: var(--tag-flight-txt); }
    .tag-hotel    { background: var(--tag-hotel-bg);    color: var(--tag-hotel-txt); }
    .tag-charter  { background: var(--tag-charter-bg);  color: var(--tag-charter-txt); }
    .field-row { display: flex; justify-content: space-between; font-size: 11px; padding: 4px 0; border-bottom: 1px solid var(--divider); gap: 8px; }
    .field-row:last-of-type { border-bottom: none; }
    .field-label { color: var(--text3); flex-shrink: 0; }
    .field-val { font-weight: 500; text-align: right; color: var(--text2); }
    .cal-btn { display: inline-flex; align-items: center; gap: 5px; margin-top: 10px; padding: 6px 12px; font-size: 12px; font-weight: 500; color: var(--text); background: var(--bg2); border: 1px solid var(--border); border-radius: 6px; text-decoration: none; }
    .cal-btn:hover { background: var(--bg3); }

    /* ── Detected event cards ──────────────────────────────────────────── */
    .detected-card { border: 1px solid var(--border); border-radius: 10px; margin-bottom: 10px; background: var(--card-bg); overflow: hidden; transition: border-color 0.15s; }
    .detected-card.selected { border-color: #3ecf8e; }
    .detected-card-header { display: flex; align-items: center; gap: 10px; padding: 10px 12px; cursor: pointer; }
    .detect-checkbox { width: 16px; height: 16px; accent-color: #3ecf8e; flex-shrink: 0; cursor: pointer; }
    .detected-title { font-weight: 600; font-size: 13px; flex: 1; color: var(--text); }
    .detected-meta  { font-size: 11px; color: var(--text3); }
    .event-type-tag { font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 5px; flex-shrink: 0; }
    .type-dinner      { background: var(--type-dinner-bg);  color: var(--type-dinner-txt); }
    .type-meeting     { background: var(--type-meeting-bg); color: var(--type-meeting-txt); }
    .type-appointment { background: var(--type-appt-bg);    color: var(--type-appt-txt); }
    .type-event       { background: var(--type-event-bg);   color: var(--type-event-txt); }
    .type-other       { background: var(--type-other-bg);   color: var(--type-other-txt); }
    .edit-panel { padding: 0 12px 12px; border-top: 1px solid var(--divider); display: none; }
    .detected-card.selected .edit-panel { display: block; }
    .edit-row { margin-top: 10px; }
    .edit-label { font-size: 10px; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; color: var(--text3); margin-bottom: 4px; }
    .edit-input { width: 100%; padding: 6px 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 12px; color: var(--text); background: var(--bg); outline: none; font-family: inherit; }
    .edit-input:focus { border-color: var(--border2); }
    .edit-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
    .edit-textarea { width: 100%; padding: 6px 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 12px; color: var(--text); background: var(--bg); outline: none; font-family: inherit; resize: vertical; min-height: 56px; }
    .edit-textarea:focus { border-color: var(--border2); }

    /* ── Detect action row ─────────────────────────────────────────────── */
    .detect-actions { display: flex; gap: 8px; margin-top: 10px; }
    .select-btn { flex: 1; padding: 7px; font-size: 12px; font-weight: 500; border: 1px solid var(--border); border-radius: 7px; background: var(--bg2); cursor: pointer; color: var(--text2); }
    .select-btn:hover { background: var(--bg3); }
    .retry-btn { padding: 7px 14px; font-size: 12px; font-weight: 500; border: 1px solid var(--border); border-radius: 7px; background: var(--bg2); cursor: pointer; color: var(--text2); display: flex; align-items: center; gap: 5px; }
    .retry-btn:hover { background: var(--bg3); }
    .add-cal-btn { width: 100%; padding: 10px; font-size: 13px; font-weight: 600; background: var(--add-cal-bg); color: var(--add-cal-txt); border: none; border-radius: 8px; cursor: pointer; margin-top: 12px; transition: opacity 0.15s; }
    .add-cal-btn:hover { opacity: 0.88; }
    .add-cal-btn:disabled { opacity: 0.25; cursor: not-allowed; }

    /* ── Footer ────────────────────────────────────────────────────────── */
    .footer { margin-top: 16px; display: flex; align-items: center; justify-content: space-between; }
    #change-key-btn { background: none; border: none; color: var(--footer-txt); font-size: 11px; cursor: pointer; padding: 0; }
    #change-key-btn:hover { color: var(--text3); text-decoration: underline; }

    /* ── Theme toggle ──────────────────────────────────────────────────── */
    .theme-toggle { background: var(--bg2); border: 1px solid var(--border); border-radius: 20px; padding: 4px 10px; font-size: 11px; font-weight: 500; cursor: pointer; color: var(--text3); display: flex; align-items: center; gap: 5px; transition: background 0.15s; }
    .theme-toggle:hover { background: var(--bg3); }
    .theme-toggle-icon { font-size: 13px; line-height: 1; }

/* ── Footer ── */
.footer { display:flex; align-items:center; justify-content:space-between; padding:8px 12px; border-top:1px solid var(--border); flex-shrink:0; }
#footer-auth { display:flex; align-items:center; }
.connect-google-btn { display:flex; align-items:center; gap:5px; background:none; border:1px solid var(--border); border-radius:5px; padding:4px 10px; color:var(--muted); font-size:10px; cursor:pointer; }
.connect-google-btn:hover { border-color:var(--accent); color:var(--accent); }
#footer-account { display:flex; align-items:center; gap:6px; }
.account-avatar { width:20px; height:20px; border-radius:50%; background:#4285f4; display:flex; align-items:center; justify-content:center; color:#fff; font-size:9px; font-weight:700; flex-shrink:0; }
.account-email { color:var(--muted); font-size:10px; }
.text-btn { background:none; border:none; color:var(--muted); font-size:10px; cursor:pointer; text-decoration:underline; padding:0; }
.icon-btn { background:none; border:none; color:var(--muted); cursor:pointer; padding:2px; display:flex; align-items:center; }
.icon-btn:hover { color:var(--fg); }

/* ── Theme toggle switch ── */
.theme-switch { display:flex; align-items:center; gap:5px; cursor:pointer; font-size:10px; color:var(--muted); user-select:none; }
.theme-switch input { display:none; }
.theme-track { width:28px; height:16px; background:#444; border-radius:8px; position:relative; transition:background .2s; flex-shrink:0; }
.theme-switch input:checked ~ .theme-track { background:var(--accent); }
.theme-thumb { width:12px; height:12px; background:#fff; border-radius:50%; position:absolute; top:2px; left:2px; transition:transform .2s; }
.theme-switch input:checked ~ .theme-track .theme-thumb { transform:translateX(12px); }

/* ── Calendar picker ── */
#cal-picker-row { padding:0 12px 8px; }
.picker-label { font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; margin-bottom:4px; }
.cal-picker-wrap { position:relative; }
.cal-picker-btn { display:flex; align-items:center; justify-content:space-between; background:var(--bg2); border:1px solid var(--accent); border-radius:6px; padding:7px 10px; cursor:pointer; width:100%; color:var(--text); font-size:12px; }
.cal-picker-selected { display:flex; align-items:center; gap:8px; }
.cal-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
.cal-picker-dropdown { position:absolute; bottom:calc(100% + 2px); left:0; right:0; background:var(--bg2); border:1px solid var(--border); border-radius:6px; z-index:100; overflow:hidden; display:none; box-shadow:0 4px 16px rgba(0,0,0,0.6); }
.cal-picker-dropdown.open { display:block; }
.cal-picker-item { display:flex; align-items:center; gap:8px; padding:8px 10px; cursor:pointer; font-size:12px; color:var(--fg); }
.cal-picker-item:hover { background:var(--hover); }
.cal-picker-item.active { background:var(--hover); }

/* ── Settings panel ── */
#settings-panel { display:none; flex-direction:column; position:fixed; inset:0; background:var(--bg); z-index:200; overflow:hidden; }
.settings-header { display:flex; align-items:center; padding:10px 12px; border-bottom:1px solid var(--border); flex-shrink:0; position:relative; }
.settings-title { font-weight:600; font-size:13px; position:absolute; left:50%; transform:translateX(-50%); }
#settings-body { overflow-y:auto; flex:1; padding:12px; }
.settings-section-label { font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; margin-bottom:4px; }
.settings-hint { font-size:11px; color:var(--muted); margin-bottom:12px; line-height:1.5; }
.alias-cal-card { background:var(--card); border-radius:6px; padding:8px 10px; margin-bottom:6px; }
.alias-cal-name { display:flex; align-items:center; gap:6px; font-weight:600; font-size:11px; color:var(--muted); }
.alias-cal-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:6px; }
.cal-vis-toggle { position:relative; width:32px; height:18px; border-radius:9px; cursor:pointer; flex-shrink:0; border:none; padding:0; transition:background 0.2s; }
.cal-vis-toggle::after { content:''; position:absolute; width:12px; height:12px; border-radius:50%; background:#fff; top:3px; transition:left 0.2s; }
.cal-vis-toggle.on::after  { left:17px; }
.cal-vis-toggle.off::after { left:3px; background:#ccc; }
.alias-cal-card.hidden { opacity:0.5; }
.alias-tags { display:flex; flex-wrap:wrap; gap:4px; }
.alias-tag { background:var(--bg); border:1px solid var(--border); border-radius:20px; padding:2px 8px; font-size:10px; color:var(--fg); display:flex; align-items:center; gap:4px; }
.alias-tag-remove { background:none; border:none; color:var(--muted); cursor:pointer; padding:0; font-size:12px; line-height:1; }
.alias-add-pill { background:none; border:1px dashed var(--border); border-radius:20px; padding:2px 8px; font-size:10px; color:var(--muted); cursor:pointer; }
.alias-add-pill:hover { border-color:var(--accent); color:var(--accent); }
.alias-input-row { display:flex; align-items:center; gap:6px; margin-top:6px; }
.alias-input { background:var(--bg); border:1px solid var(--accent); border-radius:4px; padding:3px 6px; color:var(--fg); font-size:11px; outline:none; flex:1; }
.alias-confirm-btn { background:var(--accent); border:none; border-radius:4px; padding:3px 8px; font-size:11px; font-weight:600; cursor:pointer; color:#000; }
.gmail-toggle-row { display:flex; align-items:center; justify-content:space-between; background:var(--card); border-radius:6px; padding:8px 10px; margin-bottom:6px; }
.gmail-toggle-label { font-size:11px; color:var(--fg); }

  </style>
</head>
<body>

  <div class="header">
    <div class="header-icon">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#111" stroke-width="2">
        <rect x="3" y="4" width="18" height="18" rx="2"/>
        <line x1="16" y1="2" x2="16" y2="6"/>
        <line x1="8" y1="2" x2="8" y2="6"/>
        <line x1="3" y1="10" x2="21" y2="10"/>
      </svg>
    </div>
    <div>
      <div class="header-title">Travel &amp; Events Shortcut</div>
      <div class="header-sub">Drop files, paste, or scan the page</div>
    </div>
  </div>

  <div class="api-row" id="api-row">
    <input type="password" id="api-key-input" placeholder="Paste your Gemini API key..." />
    <button class="api-save-btn" id="save-key-btn">Save</button>
  </div>
  <div class="url-row">
    <input type="text" id="url-input" placeholder="Paste a PDF link from email..." />
    <button class="url-btn" id="url-btn">Fetch</button>
  </div>
  <div class="or-divider"><span>or</span></div>

  <div class="drop-zone" id="drop-zone">
    <div class="upload-icon">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
        <polyline points="17 8 12 3 7 8"/>
        <line x1="12" y1="3" x2="12" y2="15"/>
      </svg>
    </div>
    <div class="upload-label" id="drop-label">Drop any file — PDF, email, image, or screenshot</div>
    <div class="upload-sublabel">Ctrl+V / ⌘V to paste text, images, or files</div>
    <input type="file" id="file-input" accept=".pdf,.eml,.txt,image/*" multiple />
    <button class="browse-btn" id="browse-btn">Browse files</button>
  </div>

  <div class="file-list" id="file-list"></div>

  <button class="btn-primary" id="extract-btn" disabled>Extract calendar events</button>

  <button class="btn-scan" id="scan-btn">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    Scan this page for events
  </button>
  <div class="scan-hint">or upload a picture above</div>

  <div id="status"></div>
    <!-- Calendar picker (shown when signed in, hidden otherwise) -->
    <div id="cal-picker-row" style="display:none">
      <div class="picker-label">Add to calendar</div>
      <div class="cal-picker-wrap" id="cal-picker-wrap">
        <button class="cal-picker-btn" id="cal-picker-btn" type="button">
          <span class="cal-picker-selected" id="cal-picker-selected">
            <span class="cal-dot" id="cal-picker-dot"></span>
            <span id="cal-picker-name">Select calendar</span>
          </span>
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
        </button>
        <div class="cal-picker-dropdown" id="cal-picker-dropdown"></div>
      </div>
    </div>

    <div id="results"></div>

    <div class="footer" id="main-footer">
      <!-- Google auth area -->
      <div id="footer-auth">
        <button class="connect-google-btn" id="connect-google-btn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15.545 6.558a9.42 9.42 0 0 1 .139 1.626c0 2.434-.87 4.492-2.384 5.885h.002C11.978 15.292 10.158 16 8 16A8 8 0 1 1 8 0a7.689 7.689 0 0 1 5.352 2.082l-2.284 2.284A4.347 4.347 0 0 0 8 3.166c-2.087 0-4.03 1.222-4.979 3.188A4.95 4.95 0 0 0 2.5 8c0 .716.137 1.4.385 2.026C3.878 12.14 5.753 13.33 8 13.33a4.855 4.855 0 0 0 3.363-1.358"/></svg>
          Connect Google
        </button>
        <div id="footer-account" style="display:none">
          <div class="account-avatar" id="account-avatar">J</div>
          <span class="account-email" id="account-email">jeremy@example.com</span>
          <button class="text-btn" id="sign-out-btn">sign out</button>
        </div>
      </div>
      <!-- Right side: settings gear + theme toggle -->
      <div style="display:flex;align-items:center;gap:10px">
        <button class="icon-btn" id="settings-btn" title="Settings">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        </button>
        <label class="theme-switch" title="Toggle theme">
          <input type="checkbox" id="theme-toggle-input">
          <span class="theme-track"><span class="theme-thumb"></span></span>
          <span id="theme-label">Light mode</span>
        </label>
      </div>
    </div>

    <!-- Settings panel (hidden by default) -->
    <div id="settings-panel" style="display:none">
      <div class="settings-header">
        <button class="icon-btn" id="settings-back-btn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
          Back
        </button>
        <span class="settings-title">Settings</span>
      </div>
      <div id="settings-body"></div>
    </div>

    <script src="google-api.js"></script>
  <script src="popup.js"></script>
</body>
</html>
